services:
  db:
    image: postgres:17
    container_name: bd_Johana_Bolivar_PuertaDeOro

    environment:
      POSTGRES_DB: bd_Johana_Bolivar_PuertaDeOro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    ports:
      - "5433:5432"

    volumes:
      - bd_Johana_Bolivar_PuertaDeOro:/var/lib/postgresql/data

volumes:
  bd_Johana_Bolivar_PuertaDeOro: